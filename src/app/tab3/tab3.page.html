<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title> Food please</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="medium">Food please</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <ion-grid class="ion-margin" [hidden]="recipes.length == 0">
      <ion-row *ngFor="let recipe of recipes; index as i">
        <ion-col size="8">{{ recipe.description }}</ion-col>
        <ion-col size="2"
          ><ion-button size="small" color="tertiary"
            ><a href="{{recipe.link}}" target="_blank"
              ><ion-icon name="link"></ion-icon></a></ion-button
        ></ion-col>
        <ion-col size="2"
          ><ion-button
            (click)="deleteRecipes(recipe)"
            size="small"
            color="tertiary"
            ><ion-icon name="trash"></ion-icon></ion-button
        ></ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <ion-fab vertical="bottom" horizontal="start" slot="fixed">
    <ion-fab-button color="tertiary" (click)="presentAddModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
